<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout Tracker">
<meta name="description" content="Personal workout tracker for Push / Pull training.">
<title>Workout Tracker</title>
<style>
  :root {
    --bg: #0f1114;
    --card: #1a1d23;
    --card-border: #2a2d35;
    --text: #e8e8ec;
    --text-dim: #6e7179;
    --input-bg: #22252c;
    --push-accent: #f0654a;
    --push-glow: rgba(240, 101, 74, 0.15);
    --pull-accent: #4a9ff0;
    --pull-glow: rgba(74, 159, 240, 0.15);
    --check-green: #3dd68c;
    --check-glow: rgba(61, 214, 140, 0.15);
    --section-bg: #15171c;
    --danger: #e5484d;
    --danger-glow: rgba(229, 72, 77, 0.12);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg) !important; color: var(--text) !important; }
  body { font-family: var(--font); min-height: 100vh; min-height: 100dvh; padding: 1rem; padding-top: max(1rem, env(safe-area-inset-top)); padding-bottom: max(1rem, env(safe-area-inset-bottom)); overscroll-behavior: none; }
  h1 { font-weight: 800; font-size: 1.6rem; text-align: center; margin: 0.75rem 0 0.25rem; letter-spacing: -0.02em; color: var(--text); }
  .sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .sync-bar { text-align: center; font-size: 0.68rem; color: var(--text-dim); margin-bottom: 0.75rem; }
  .nav { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; }
  .nav-btn { flex: 1; padding: 0.65rem 0.4rem; border: 2px solid var(--card-border); border-radius: 12px; background: var(--card); color: var(--text-dim); font-weight: 600; font-size: 0.9rem; text-align: center; cursor: pointer; transition: all 0.25s; }
  .nav-btn.active-push { border-color: var(--push-accent); color: var(--push-accent); background: var(--push-glow); }
  .nav-btn.active-pull { border-color: var(--pull-accent); color: var(--pull-accent); background: var(--pull-glow); }
  .nav-btn.active-history { border-color: var(--check-green); color: var(--check-green); background: var(--check-glow); }
  .view { display: none; }
  .view.active { display: block; }
  .section { margin-bottom: 1.25rem; }
  .section-title { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.5rem 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; }
  .push-view .section-title { color: var(--push-accent); background: var(--push-glow); }
  .pull-view .section-title { color: var(--pull-accent); background: var(--pull-glow); }
  .item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.55rem 0.5rem; border-radius: 10px; transition: background 0.15s; -webkit-user-select: none; user-select: none; }
  .item-check { flex-shrink: 0; width: 24px; height: 24px; border: 2px solid var(--card-border); border-radius: 7px; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; }
  .item-check svg { width: 14px; height: 14px; stroke: var(--bg); stroke-width: 3; fill: none; opacity: 0; transform: scale(0.5); transition: all 0.2s; }
  .item.checked .item-check { background: var(--check-green); border-color: var(--check-green); }
  .item.checked .item-check svg { opacity: 1; transform: scale(1); }
  .item-content { flex: 1; cursor: pointer; }
  .item-name { font-weight: 500; font-size: 0.95rem; line-height: 1.35; color: var(--text); transition: opacity 0.2s; }
  .item-detail { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; line-height: 1.3; }
  .item.checked .item-name { opacity: 0.4; text-decoration: line-through; }
  .item.checked .item-detail { opacity: 0.3; }
  .edit-btn { flex-shrink: 0; width: 30px; height: 30px; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card); color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 1px; }
  .edit-btn:active { background: var(--input-bg); }
  .edit-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }
  .item-editing { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 0.65rem; margin-bottom: 0.4rem; animation: fadeIn 0.15s ease; }
  .edit-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; }
  .edit-row input { flex: 1; font-family: var(--font); font-size: 0.88rem; padding: 0.5rem 0.6rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--input-bg); color: var(--text); outline: none; min-width: 0; }
  .edit-row input:focus { border-color: #555; }
  .edit-row input::placeholder { color: var(--text-dim); }
  .edit-actions { display: flex; gap: 0.4rem; }
  .edit-save, .edit-cancel, .edit-delete { font-family: var(--font); font-weight: 700; font-size: 0.75rem; padding: 0.4rem 0.7rem; border: none; border-radius: 8px; cursor: pointer; }
  .edit-save { background: var(--check-green); color: var(--bg); }
  .edit-cancel { background: var(--card); color: var(--text-dim); border: 1px solid var(--card-border); }
  .edit-delete { background: var(--danger-glow); color: var(--danger); margin-left: auto; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .progress-bar { height: 4px; border-radius: 2px; background: var(--card); margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.35s ease; }
  .push-view .progress-fill { background: var(--push-accent); }
  .pull-view .progress-fill { background: var(--pull-accent); }
  .bottom-bar { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 1.25rem; }
  .bottom-bar.hidden { display: none; }
  .action-btn { font-weight: 600; font-size: 0.85rem; padding: 0.7rem 1.5rem; border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; flex: 1; }
  .action-btn:active { transform: scale(0.96); }
  .btn-reset { background: var(--card); color: var(--text); border: 1px solid var(--card-border); }
  .btn-end-push { background: var(--push-accent); color: #fff; }
  .btn-end-pull { background: var(--pull-accent); color: #fff; }
  .history-edit-btn { font-size: 0.7rem; font-weight: 700; color: var(--pull-accent); background: none; border: 1px solid var(--card-border); border-radius: 6px; padding: 0.2rem 0.5rem; cursor: pointer; margin-left: 0.5rem; }
  .history-editing .history-entry { border-color: var(--pull-accent); }
  .history-ex-toggle { display: flex; align-items: baseline; gap: 0.4rem; padding: 0.25rem 0; cursor: pointer; border-radius: 6px; }
  .history-ex-toggle:active { background: var(--section-bg); }
  .history-edit-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .hist-save-btn { font-family: var(--font); font-weight: 700; font-size: 0.78rem; padding: 0.45rem 1rem; background: var(--check-green); color: var(--bg); border: none; border-radius: 8px; cursor: pointer; }
  .hist-cancel-btn { font-family: var(--font); font-weight: 700; font-size: 0.78rem; padding: 0.45rem 1rem; background: var(--card); color: var(--text-dim); border: 1px solid var(--card-border); border-radius: 8px; cursor: pointer; }
  .add-exercise { display: flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.6rem; margin-top: 0.5rem; border: 1px dashed var(--card-border); border-radius: 10px; color: var(--text-dim); font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  .add-exercise:active { background: var(--section-bg); }
  .history-empty { text-align: center; color: var(--text-dim); padding: 3rem 1rem; font-size: 0.9rem; line-height: 1.6; }
  .history-entry { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 0.85rem; margin-bottom: 0.75rem; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .history-type { font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.25rem 0.6rem; border-radius: 6px; }
  .history-type.push { color: var(--push-accent); background: var(--push-glow); }
  .history-type.pull { color: var(--pull-accent); background: var(--pull-glow); }
  .history-date { font-size: 0.78rem; color: var(--text-dim); }
  .history-stats { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 0.4rem; }
  .history-exercises { font-size: 0.82rem; line-height: 1.5; }
  .history-ex { display: flex; gap: 0.4rem; align-items: baseline; }
  .history-ex-check { color: var(--check-green); font-size: 0.7rem; }
  .history-ex-miss { color: var(--text-dim); font-size: 0.7rem; }
  .history-ex-name { color: var(--text); }
  .history-ex-detail { color: var(--text-dim); font-size: 0.78rem; }
  .history-delete { font-size: 0.7rem; font-weight: 700; color: var(--danger); background: none; border: 1px solid var(--card-border); border-radius: 6px; padding: 0.2rem 0.5rem; cursor: pointer; margin-left: 0.5rem; }
  .history-cancel-btn { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); background: none; border: 1px solid var(--card-border); border-radius: 6px; padding: 0.2rem 0.5rem; cursor: pointer; margin-left: 0.5rem; }
.history-workout-title { font-weight: 800; font-size: 1rem; letter-spacing: -0.01em; margin: 0.15rem 0 0.65rem; }
.history-workout-title.push { color: var(--push-accent); }
.history-workout-title.pull { color: var(--pull-accent); }
  .clear-history { display: block; margin: 1rem auto; font-weight: 700; font-size: 0.8rem; padding: 0.5rem 1.2rem; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card); color: var(--danger); cursor: pointer; }
  .toast { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--check-green); color: var(--bg); font-weight: 700; padding: 0.7rem 1.5rem; border-radius: 10px; font-size: 0.85rem; opacity: 0; transition: all 0.35s ease; pointer-events: none; z-index: 99; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .user-toggle { display: flex; justify-content: center; gap: 0.4rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .user-pill { padding: 0.3rem 0.9rem; border: 1.5px solid var(--card-border); border-radius: 20px; background: var(--card); color: var(--text-dim); font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .user-pill.active { border-color: #a78bfa; color: #a78bfa; background: rgba(167, 139, 250, 0.12); }
  .user-pill:active { transform: scale(0.95); }
  .user-add-btn { padding: 0.3rem 0.7rem; border: 1.5px dashed var(--card-border); border-radius: 20px; background: none; color: var(--text-dim); font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .user-add-btn:hover { border-color: #a78bfa; color: #a78bfa; }
  .user-manage-btn { padding: 0.3rem 0.7rem; border: 1.5px solid var(--card-border); border-radius: 20px; background: none; color: var(--text-dim); font-weight: 600; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .user-manage-btn:hover { border-color: var(--danger); color: var(--danger); }
  .user-add-input { background: var(--input-bg); border: 1.5px solid #a78bfa; border-radius: 20px; color: var(--text); font-family: var(--font); font-size: 0.78rem; font-weight: 600; padding: 0.28rem 0.75rem; outline: none; width: 110px; }
  .user-add-confirm { padding: 0.3rem 0.6rem; border: none; border-radius: 20px; background: #a78bfa; color: #fff; font-weight: 700; font-size: 0.78rem; cursor: pointer; }
  .user-add-cancel { padding: 0.3rem 0.6rem; border: 1.5px solid var(--card-border); border-radius: 20px; background: none; color: var(--text-dim); font-weight: 600; font-size: 0.78rem; cursor: pointer; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 1.25rem; width: 280px; }
  .modal-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 1rem; color: var(--text); }
  .modal-user-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--card-border); }
  .modal-user-row:last-of-type { border-bottom: none; }
  .modal-user-name { font-weight: 600; font-size: 0.88rem; color: var(--text); }
  .modal-user-name.active { color: #a78bfa; }
  .modal-remove-btn { font-family: var(--font); font-weight: 700; font-size: 0.72rem; padding: 0.25rem 0.6rem; border: 1px solid var(--card-border); border-radius: 8px; background: none; color: var(--danger); cursor: pointer; }
  .modal-remove-btn:disabled { opacity: 0.3; cursor: default; }
  .modal-close-btn { display: block; width: 100%; margin-top: 1rem; padding: 0.55rem; border: 1px solid var(--card-border); border-radius: 10px; background: var(--card); color: var(--text-dim); font-family: var(--font); font-weight: 600; font-size: 0.85rem; cursor: pointer; }
</style>
</head>
<body>
<h1>Push / Pull</h1>
<div class="sync-bar" id="sync-bar"><span class="sync-dot" id="sync-dot" style="background:#6e7179"></span>Connecting...</div>
<div class="user-toggle" id="user-toggle" style="display:none"></div>

<div class="nav">
  <div class="nav-btn" id="nav-push" onclick="switchView('push')">Push</div>
  <div class="nav-btn" id="nav-pull" onclick="switchView('pull')">Pull</div>
  <div class="nav-btn" id="nav-history" onclick="switchView('history')">History</div>
</div>

<div class="bottom-bar hidden" id="bottom-bar"></div>

<div class="view push-view" id="view-push">
  <div class="progress-bar"><div class="progress-fill" id="progress-push"></div></div>
  <div id="list-push"></div>
</div>
<div class="view pull-view" id="view-pull">
  <div class="progress-bar"><div class="progress-fill" id="progress-pull"></div></div>
  <div id="list-pull"></div>
</div>
<div class="view" id="view-history">
  <div id="history-list"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// --- FIREBASE ---
firebase.initializeApp({
  apiKey: "AIzaSyDsx168vmDqXFiy-q4RFO7S98ixigvmPOA",
  authDomain: "workout-tracker-99.firebaseapp.com",
  databaseURL: "https://workout-tracker-99-default-rtdb.firebaseio.com",
  projectId: "workout-tracker-99",
  storageBucket: "workout-tracker-99.firebasestorage.app",
  messagingSenderId: "554925864670",
  appId: "1:554925864670:web:13ee5052dbfac6bd01744f"
});
var db = firebase.database();
var configRef = db.ref("_config/users");

// --- USERS ---
var USERS = ["Eylon"]; // overwritten from Firebase on load
var currentUser = localStorage.getItem("selectedUser") || USERS[0];

function saveUsers() {
  configRef.set(USERS);
}

function addUser(name) {
  name = name.trim();
  if (!name || USERS.indexOf(name) !== -1) return;
  USERS.push(name);
  saveUsers();
  switchUser(name);
}

function removeUser(name) {
  if (USERS.length <= 1) return;
  var idx = USERS.indexOf(name);
  if (idx === -1) return;
  USERS.splice(idx, 1);
  saveUsers();
  if (currentUser === name) {
    currentUser = USERS[0];
    localStorage.setItem("selectedUser", currentUser);
    updateRefs();
    loadFromFirebase();
  }
  renderUserToggle();
}

var workoutsRef, checksRef, historyRef;
function updateRefs() {
  workoutsRef = db.ref("users/" + currentUser + "/workouts");
  checksRef   = db.ref("users/" + currentUser + "/checks");
  historyRef  = db.ref("users/" + currentUser + "/history");
}
updateRefs();

function dbg(msg) { /* debug disabled in production */ }

// --- DEFAULT DATA ---
var defaultData = {
  push: [
    { section: "Warm-Up", items: [
      { name: "Leg Side to Side", detail: "" },
      { name: "Crunch with Stomach Up", detail: "" },
      { name: "Windshield", detail: "" },
      { name: "Best Stretch in the World", detail: "" },
      { name: "Superman", detail: "" },
      { name: "Banded Pull Apart", detail: "" }
    ]},
    { section: "Push Exercises", items: [
      { name: "Box Squats", detail: "Hold weight upside down, tap on bench - 50 lbs" },
      { name: "Dumbbell Chest Press", detail: "Bench, lie on back - 20 lbs" },
      { name: "Chest Fly Machine", detail: "Back to machine, deep stretch - 40 lbs" },
      { name: "Single Arm Push Press", detail: "Legs one behind the other - 17.5 lbs" },
      { name: "Single Leg Press", detail: "Left toe pointed out - 25 lbs" },
      { name: "Plank", detail: "3 sets, 30-60 seconds" }
    ]},
    { section: "Post", items: [
      { name: "Shoulder Stretch on Wall", detail: "" },
      { name: "90/90 Swivel", detail: "" },
      { name: "Tibia Stretch on Wall", detail: "" },
      { name: "Roller", detail: "" }
    ]}
  ],
  pull: [
    { section: "Warm-Up", items: [
      { name: "Leg Side to Side", detail: "" },
      { name: "Crunch with Stomach Up", detail: "" },
      { name: "Windshield", detail: "" },
      { name: "Best Stretch in the World", detail: "" },
      { name: "Superman", detail: "" },
      { name: "Banded Pull Apart", detail: "" }
    ]},
    { section: "Pull Exercises", items: [
      { name: "Kettlebell Goblet Squats", detail: "From blocks - 20 lbs" },
      { name: "Dumbbell Row", detail: "Leg on bench, row with one arm - 35 lbs" },
      { name: "Glute Bridge", detail: "Back barely on bench, weight between legs - 45 lbs" },
      { name: "Single Arm Cable Row", detail: "17.5 lbs, Pin 13" },
      { name: "TRX Assisted Pull-Ups", detail: "" },
      { name: "Dumbbell Biceps Curl", detail: "" }
    ]},
    { section: "Post", items: [
      { name: "Shoulder Stretch on Wall", detail: "" },
      { name: "90/90 Swivel", detail: "" },
      { name: "Tibia Stretch on Wall", detail: "" },
      { name: "Roller", detail: "" }
    ]}
  ]
};

// Blank template for new users — section headers only, no exercises
var blankData = {
  push: [
    { section: "Warm-Up", items: [] },
    { section: "Push Exercises", items: [] },
    { section: "Post", items: [] }
  ],
  pull: [
    { section: "Warm-Up", items: [] },
    { section: "Pull Exercises", items: [] },
    { section: "Post", items: [] }
  ]
};

// --- STATE ---
var workoutData = JSON.parse(JSON.stringify(defaultData));
var checkedState = { push: [], pull: [] };
var historyData = [];
var currentView = "push";
var editingItem = null;

// --- SYNC ---
function setSyncStatus(status) {
  var bar = document.getElementById("sync-bar");
  if (!bar) return;

  var color = "#6e7179";
  var label = "Connecting...";

  if (status === "connected") {
    color = "#3dd68c";
    label = "Synced";
  } else if (status === "saving") {
    color = "#f0654a";
    label = "Saving...";
  } else if (status === "error") {
    color = "#e5484d";
    label = "Offline - using local data";
  }

  bar.innerHTML = '<span class="sync-dot" id="sync-dot" style="background:' + color + '"></span>' + label;
}

function normalizeWorkoutData(value) {
  if (!value) return null;
  ["push", "pull"].forEach(function(wk) {
    if (!value[wk]) return;
    var secs = Array.isArray(value[wk]) ? value[wk] : Object.values(value[wk]);
    value[wk] = secs.map(function(sec) {
      return {
        section: sec.section || "",
        items: sec.items ? (Array.isArray(sec.items) ? sec.items : Object.values(sec.items)) : []
      };
    });
  });
  return value;
}

function normalizeHistory(value) {
  if (!value || value === "none") return [];
  var arr = Array.isArray(value) ? value : Object.values(value);
  return arr.map(function(entry) {
    if (entry.sections) {
      var secs = Array.isArray(entry.sections) ? entry.sections : Object.values(entry.sections);
      entry.sections = secs.map(function(sec) {
        sec.items = Array.isArray(sec.items) ? sec.items : (sec.items ? Object.values(sec.items) : []);
        return sec;
      });
    }
    if (entry.exercises) {
      entry.exercises = Array.isArray(entry.exercises) ? entry.exercises : Object.values(entry.exercises);
    }
    return entry;
  });
}

function saveToFirebase(andThen) {
  setSyncStatus("saving");
  dbg("SAVE called. history length: " + (historyData ? historyData.length : "null"));

  Promise.all([
    workoutsRef.set(workoutData),
    checksRef.set(checkedState),
    historyRef.set(historyData || [])
  ]).then(function() {
    dbg("SAVE SUCCESS");
    return historyRef.once("value");
  }).then(function(snapshot) {
    dbg("VERIFY history exists: " + (snapshot.exists() ? "yes" : "no"));
    setSyncStatus("connected");
    if (andThen) andThen();
  }).catch(function(err) {
    dbg("SAVE FAILED: " + err.message);
    setSyncStatus("error");
    alert("Save failed: " + err.message);
    if (andThen) andThen();
  });
}

// One-time migration: if users/<name>/workouts is empty but root /workouts
// has data (old format), copy it across then delete the root paths.
function migrateRootDataIfNeeded() {
  return workoutsRef.once("value").then(function(snap) {
    if (snap.exists()) return Promise.resolve(); // already on new path
    return Promise.all([
      db.ref("workouts").once("value"),
      db.ref("checks").once("value"),
      db.ref("history").once("value")
    ]).then(function(results) {
      if (!results[0].exists()) return Promise.resolve(); // nothing to migrate
      var writes = [workoutsRef.set(results[0].val())];
      if (results[1].exists()) writes.push(checksRef.set(results[1].val()));
      if (results[2].exists()) writes.push(historyRef.set(results[2].val()));
      return Promise.all(writes).then(function() {
        return Promise.all([
          db.ref("workouts").remove(),
          db.ref("checks").remove(),
          db.ref("history").remove()
        ]);
      });
    });
  });
}

function loadFromFirebase() {
  dbg("Loading from Firebase...");
  setSyncStatus("saving");

  // Load user list from Firebase first
  configRef.once("value").then(function(snap) {
    if (snap.exists()) {
      var val = snap.val();
      USERS = Array.isArray(val) ? val : Object.values(val);
    }
    if (USERS.indexOf(currentUser) === -1) {
      currentUser = USERS[0];
      localStorage.setItem("selectedUser", currentUser);
    }
    updateRefs();
    renderUserToggle();
    return migrateRootDataIfNeeded();
  }).then(function() {
    return Promise.all([
      workoutsRef.once("value"),
      checksRef.once("value"),
      historyRef.once("value")
    ]);
  }).then(function(results) {
    var workoutsSnap = results[0];
    var checksSnap = results[1];
    var historySnap = results[2];

    workoutData = normalizeWorkoutData(workoutsSnap.val()) || JSON.parse(JSON.stringify(blankData));
    checkedState = checksSnap.val() || { push: [], pull: [] };
    historyData = normalizeHistory(historySnap.val());

    dbg("Loaded workouts OK: " + (workoutsSnap.exists() ? "yes" : "default"));
    dbg("Loaded checks OK: " + (checksSnap.exists() ? "yes" : "default"));
    dbg("Loaded history OK, length: " + historyData.length);

    setSyncStatus("connected");
    switchView("push");
  }).catch(function(err) {
    console.error("Firebase load error:", err);
    setSyncStatus("error");
    switchView("push");
  });
}

// --- VIEW SWITCHING ---
function switchView(v) {

  for (var i = 0; i < views.length; i++) {
    var id = views[i];

// --- RENDER WORKOUT ---
function renderWorkout(wk) {
  var list = document.getElementById("list-" + wk);
  list.innerHTML = "";
  var idx = 0;

  for (var si = 0; si < workoutData[wk].length; si++) {
    var sec = workoutData[wk][si];
    var sDiv = document.createElement("div");
    sDiv.className = "section";
    var title = document.createElement("div");
    title.className = "section-title";
    title.textContent = sec.section;
    sDiv.appendChild(title);

    for (var ii = 0; ii < sec.items.length; ii++) {
      var item = sec.items[ii];
      if (editingItem && editingItem.wk === wk && editingItem.si === si && editingItem.ii === ii) {
        sDiv.appendChild(buildEditRow(wk, si, ii, item));
        idx++;
        continue;
      }
      if (!item.name.trim()) { idx++; continue; }

      var thisIdx = idx;
      var el = document.createElement("div");
      el.className = "item";
      if (checkedState[wk] && checkedState[wk][thisIdx]) el.className += " checked";

      var check = document.createElement("div");
      check.className = "item-check";
      check.innerHTML = '<svg><polyline points="4 8 8 12 16 4"/></svg>';

      var content = document.createElement("div");
      content.className = "item-content";
      var nameSpan = document.createElement("span");
      nameSpan.className = "item-name";
      nameSpan.textContent = item.name;
      content.appendChild(nameSpan);
      if (item.detail.trim()) {
        var detailDiv = document.createElement("div");
        detailDiv.className = "item-detail";
        detailDiv.textContent = item.detail;
        content.appendChild(detailDiv);
      }

      var editBtn = document.createElement("div");
      editBtn.className = "edit-btn";
      editBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>';

      (function(w, s, i, thisI, element, checkEl) {
        var toggleFn = function() {
          element.classList.toggle("checked");
          if (!checkedState[w]) checkedState[w] = [];
          checkedState[w][thisI] = element.classList.contains("checked");
          updateProgress(w);
        };
        checkEl.onclick = toggleFn;
        content.onclick = toggleFn;
        editBtn.onclick = function() {
          editingItem = { wk: w, si: s, ii: i };
          renderWorkout(w);
        };
      })(wk, si, ii, thisIdx, el, check);

      el.appendChild(check);
      el.appendChild(content);
      el.appendChild(editBtn);
      sDiv.appendChild(el);
      idx++;
    }

    var addBtn = document.createElement("div");
    addBtn.className = "add-exercise";
    addBtn.textContent = "+ Add exercise";
    (function(w, s) {
      addBtn.onclick = function() {
        workoutData[w][s].items.push({ name: "", detail: "" });
        editingItem = { wk: w, si: s, ii: workoutData[w][s].items.length - 1 };
        renderWorkout(w);
      };
    })(wk, si);
    sDiv.appendChild(addBtn);
    list.appendChild(sDiv);
  }
  updateProgress(wk);
}

function updateProgress(wk) {

function resetChecks() {
  checkedState[currentView] = [];
  renderWorkout(currentView);
  saveToFirebase();
}

// --- END WORKOUT ---
function endWorkout() {
  var wk = currentView;
  var now = new Date();
  var sections = [];
  var totalItems = 0;
  var checkedCount = 0;
  var idx = 0;

  for (var si = 0; si < workoutData[wk].length; si++) {
    var sec = workoutData[wk][si];
    var secItems = [];
    for (var ii = 0; ii < sec.items.length; ii++) {
      var item = sec.items[ii];
      if (!item.name.trim()) { idx++; continue; }
      var done = !!(checkedState[wk] && checkedState[wk][idx]);
      secItems.push({ name: item.name, detail: item.detail, completed: done });
      totalItems++;
      if (done) checkedCount++;
      idx++;
    }
    if (secItems.length) sections.push({ section: sec.section, items: secItems });
  }

  var flatExercises = [];
  for (var s = 0; s < sections.length; s++)
    for (var e = 0; e < sections[s].items.length; e++)
      flatExercises.push(sections[s].items[e]);

  historyData.unshift({
    id: now.getTime(),
    type: wk,
    date: now.toISOString(),
    total: totalItems,
    completed: checkedCount,
    sections: sections,
    exercises: flatExercises
  });

  checkedState[wk] = [];
  renderWorkout(wk);
  showToast(wk.charAt(0).toUpperCase() + wk.slice(1) + " workout saved!");
  switchView("history");
  saveToFirebase();
}

// --- HISTORY HELPERS ---
var editingHistoryIdx = null;
// Track which individual exercise is being edited within a history entry: { secIdx, itemIdx }
var editingHistoryExercise = null;

function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === "object") return Object.values(val);
  return [];
}

function getEntrySections(entry) {
  if (entry.sections && (entry.sections.length || typeof entry.sections === "object")) {
    var secs = toArray(entry.sections);
    return secs.map(function(sec) {
      return { section: sec.section || "", items: toArray(sec.items).map(function(ex) {
        return { name: ex.name || "", detail: ex.detail || "", completed: !!ex.completed };
      })};
    });
  }

  var exercises = toArray(entry.exercises).map(function(ex) {
    return { name: ex.name || "", detail: ex.detail || "", completed: !!ex.completed };
  });

  var template = workoutData[entry.type] || [];
  if (!template.length) {
    return [{ section: "", items: exercises }];
  }

  var out = [];
  var start = 0;
  template.forEach(function(sec) {
    var count = toArray(sec.items).length;
    var slice = exercises.slice(start, start + count);
    if (slice.length) {
      out.push({ section: sec.section || "", items: slice });
    }
    start += count;
  });

  if (!out.length) {
    return [{ section: "", items: exercises }];
  }

  return out;
}

function buildCheckEl(completed) {
  var chk = document.createElement("div");
  chk.className = "item-check";
  chk.style.cssText = "flex-shrink:0;margin-top:1px;cursor:pointer;";

  if (completed) {
    chk.style.background = "var(--check-green)";
    chk.style.borderColor = "var(--check-green)";
    chk.querySelector("svg").style.opacity = "1";
    chk.querySelector("svg").style.transform = "scale(1)";
  }
  return chk;
}

function setCheckEl(chk, completed) {
  if (completed) {
    chk.style.background = "var(--check-green)"; chk.style.borderColor = "var(--check-green)";
    chk.querySelector("svg").style.opacity = "1"; chk.querySelector("svg").style.transform = "scale(1)";
  } else {
    chk.style.background = ""; chk.style.borderColor = "";
    chk.querySelector("svg").style.opacity = "0"; chk.querySelector("svg").style.transform = "scale(0.5)";
  }
}

// --- HISTORY ---
function renderHistory() {
  var list = document.getElementById("history-list");
  list.innerHTML = "";

  if (!historyData || historyData.length === 0) {
    list.innerHTML = '<div class="history-empty">No workouts yet.<br>Complete a push or pull workout and tap End Workout to log it here.</div>';
    return;
  }

  for (var i = 0; i < historyData.length; i++) {
    (function(idx) {
      var entry = historyData[idx];
      var d = new Date(entry.date);
      var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      var dateStr = days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
      var hrs = d.getHours(); var mins = d.getMinutes();
      var ampm = hrs >= 12 ? "PM" : "AM"; hrs = hrs % 12; if (hrs === 0) hrs = 12;
      var timeStr = hrs + ":" + (mins < 10 ? "0" : "") + mins + " " + ampm;

      var div = document.createElement("div");
      div.className = "history-entry";

      // Header
      var hdr = document.createElement("div");
      hdr.className = "history-header";

      var hdrLeft = document.createElement("span");
      hdrLeft.innerHTML = '<span class="history-type ' + entry.type + '">' + entry.type + '</span>';

      var hdrRight = document.createElement("span");
      hdrRight.className = "history-date";
      hdrRight.textContent = dateStr + ' - ' + timeStr;

      if (editingHistoryIdx === idx) {
        // Cancel button in header
        var cancelHdrBtn = document.createElement("button");
        cancelHdrBtn.className = "history-cancel-btn";
        cancelHdrBtn.textContent = "Cancel";
        cancelHdrBtn.onclick = function() { editingHistoryIdx = null; editingHistoryExercise = null; renderHistory(); };
        hdrRight.appendChild(cancelHdrBtn);
      } else {

        var editHdrBtn = document.createElement("button");
        editHdrBtn.className = "history-edit-btn";
        editHdrBtn.textContent = "Edit";
        editHdrBtn.onclick = function() { editHistory(idx); };
        hdrRight.appendChild(editHdrBtn);
      }

      // Delete button always present
      var deleteHdrBtn = document.createElement("button");
      deleteHdrBtn.className = "history-delete";
      deleteHdrBtn.textContent = "x";
      deleteHdrBtn.onclick = function() { confirmDeleteHistory(idx); };
      hdrRight.appendChild(deleteHdrBtn);

      hdr.appendChild(hdrLeft);
      hdr.appendChild(hdrRight);
      div.appendChild(hdr);

      var secs = getEntrySections(entry);

      if (editingHistoryIdx === idx) {
        // --- EDIT MODE ---
        // Deep-copy sections for editing (stored on the entry temporarily)
        if (!entry._editSections) {
          entry._editSections = secs.map(function(sec) {
            return {
              section: sec.section,
              items: sec.items.map(function(ex) { return { name: ex.name, detail: ex.detail, completed: ex.completed }; })
            };
          });
        }
        var editSections = entry._editSections;

        editSections.forEach(function(sec, secIdx) {
          var secWrap = document.createElement("div");

          secWrap.appendChild(secTitle);

                nameInp.oninput = function() { item.name = nameInp.value; };

                el.appendChild(content);

                secWrap.appendChild(el);

        actions.appendChild(deleteBtn2);
        div.appendChild(actions);

      } else {
        // --- VIEW MODE ---
        var allExercises = [];
        secs.forEach(function(s) { s.items.forEach(function(ex) { allExercises.push(ex); }); });
        var completedCount = allExercises.filter(function(e) { return e.completed; }).length;

        var statsEl = document.createElement("div");
        statsEl.className = "history-stats";
        statsEl.style.marginBottom = "0.5rem";
        statsEl.textContent = completedCount + " / " + (entry.total || allExercises.length) + " completed";
        div.appendChild(statsEl);

        secs.forEach(function(sec) {
          var showHeader = sec.section && !/^(push|pull)$/i.test(sec.section.trim());

          if (showHeader) {
            var secTitle = document.createElement("div");
            secTitle.className = "section-title";
            secTitle.textContent = sec.section;
            secTitle.style.color = entry.type === "push" ? "var(--push-accent)" : "var(--pull-accent)";
            secTitle.style.background = entry.type === "push" ? "var(--push-glow)" : "var(--pull-glow)";
            secTitle.style.marginBottom = "0.35rem";
            div.appendChild(secTitle);
          }

          var exDiv = document.createElement("div");
          exDiv.className = "history-exercises";
          exDiv.style.marginBottom = "0.4rem";
          sec.items.forEach(function(ex) {
            var icon = ex.completed ? '<span class="history-ex-check">&#10003;</span>' : '<span class="history-ex-miss">&#9675;</span>';
            var detail = ex.detail ? ' <span class="history-ex-detail">- ' + esc(ex.detail) + '</span>' : '';
            exDiv.innerHTML += '<div class="history-ex">' + icon + ' <span class="history-ex-name">' + esc(ex.name) + '</span>' + detail + '</div>';
          });
          div.appendChild(exDiv);
        });
      }

      list.appendChild(div);
    })(i);
  }

  if (historyData.length > 1) {
    var clearBtn = document.createElement("button");
    clearBtn.className = "clear-history";
    clearBtn.textContent = "Clear All History";
    clearBtn.onclick = function() {
      if (confirm("Clear all workout history?")) {
        historyData = []; editingHistoryIdx = null; editingHistoryExercise = null;
        renderHistory(); saveToFirebase();
      }
    };
    list.appendChild(clearBtn);
  }
}

function editHistory(i) {
  // Clean up previous edit sections
  if (editingHistoryIdx !== null && historyData[editingHistoryIdx]) {
    delete historyData[editingHistoryIdx]._editSections;
  }
  editingHistoryIdx = i;
  editingHistoryExercise = null;
  renderHistory();
}

function confirmDeleteHistory(i) {
  if (confirm("Delete this workout? This can't be undone.")) {
    deleteHistory(i);
  }
}

function deleteHistory(i) {
  if (editingHistoryIdx === i) { editingHistoryIdx = null; editingHistoryExercise = null; }
  if (historyData[i]) delete historyData[i]._editSections;
  historyData.splice(i, 1);
  renderHistory();
  saveToFirebase();
}

// --- UTILS ---
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show";
  setTimeout(function() { t.className = "toast"; }, 1800);
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- INIT ---
switchView("push");
</script>
</body>
</html>
