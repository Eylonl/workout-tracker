<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Push/Pull">
<title>Push / Pull Workout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1114;
    --card: #1a1d23;
    --card-border: #2a2d35;
    --text: #e8e8ec;
    --text-dim: #6e7179;
    --input-bg: #22252c;
    --push-accent: #f0654a;
    --push-glow: rgba(240, 101, 74, 0.15);
    --pull-accent: #4a9ff0;
    --pull-glow: rgba(74, 159, 240, 0.15);
    --check-green: #3dd68c;
    --check-glow: rgba(61, 214, 140, 0.15);
    --section-bg: #15171c;
    --danger: #e5484d;
    --danger-glow: rgba(229, 72, 77, 0.12);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: 100dvh;
padding: 1rem;
padding-top: max(1rem, env(safe-area-inset-top));
padding-bottom: 7rem;
overscroll-behavior: none;
}

h1 {
font-family: ‘Outfit’, sans-serif;
font-weight: 800;
font-size: 1.6rem;
text-align: center;
margin: 0.75rem 0 0.75rem;
letter-spacing: -0.02em;
}

/* ── Nav Tabs (Push / Pull / History) ── */
.nav { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; }
.nav-btn {
flex: 1; padding: 0.65rem 0.4rem; border: 2px solid var(–card-border);
border-radius: 12px; background: var(–card); color: var(–text-dim);
font-family: ‘Outfit’, sans-serif; font-weight: 600; font-size: 0.9rem;
text-align: center; cursor: pointer; transition: all 0.25s;
}
.nav-btn.active-push { border-color: var(–push-accent); color: var(–push-accent); background: var(–push-glow); }
.nav-btn.active-pull { border-color: var(–pull-accent); color: var(–pull-accent); background: var(–pull-glow); }
.nav-btn.active-history { border-color: var(–check-green); color: var(–check-green); background: var(–check-glow); }

/* ── Views ── */
.view { display: none; }
.view.active { display: block; }
.section { margin-bottom: 1.25rem; }

.section-title {
font-family: ‘Outfit’, sans-serif; font-weight: 600; font-size: 0.75rem;
text-transform: uppercase; letter-spacing: 0.1em;
padding: 0.5rem 0.75rem; border-radius: 8px; margin-bottom: 0.5rem;
}
.push-view .section-title { color: var(–push-accent); background: var(–push-glow); }
.pull-view .section-title { color: var(–pull-accent); background: var(–pull-glow); }

/* ── Exercise Items ── */
.item {
display: flex; align-items: flex-start; gap: 0.6rem;
padding: 0.55rem 0.5rem; border-radius: 10px;
transition: background 0.15s;
-webkit-user-select: none; user-select: none;
}

.item-check {
flex-shrink: 0; width: 24px; height: 24px;
border: 2px solid var(–card-border); border-radius: 7px; margin-top: 1px;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s; cursor: pointer;
}
.item-check svg {
width: 14px; height: 14px; stroke: var(–bg); stroke-width: 3;
fill: none; opacity: 0; transform: scale(0.5); transition: all 0.2s;
}
.item.checked .item-check { background: var(–check-green); border-color: var(–check-green); }
.item.checked .item-check svg { opacity: 1; transform: scale(1); }

.item-content { flex: 1; cursor: pointer; }
.item-name { font-weight: 500; font-size: 0.95rem; line-height: 1.35; transition: opacity 0.2s; }
.item-detail { font-size: 0.8rem; color: var(–text-dim); margin-top: 2px; line-height: 1.3; }
.item.checked .item-name { opacity: 0.4; text-decoration: line-through; }
.item.checked .item-detail { opacity: 0.3; }

.edit-btn {
flex-shrink: 0; width: 30px; height: 30px;
border: 1px solid var(–card-border); border-radius: 8px;
background: var(–card); color: var(–text-dim);
display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 0.75rem; transition: all 0.2s; margin-top: 1px;
}
.edit-btn:active { background: var(–input-bg); }
.edit-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

/* ── Inline Edit Mode ── */
.item-editing {
background: var(–card); border: 1px solid var(–card-border);
border-radius: 12px; padding: 0.65rem; margin-bottom: 0.4rem;
animation: fadeIn 0.15s ease;
}
.edit-row { display: flex; gap: 0.4rem; margin-bottom: 0.4rem; }
.edit-row input {
flex: 1; font-family: ‘DM Sans’, sans-serif; font-size: 0.88rem;
padding: 0.5rem 0.6rem; border: 1px solid var(–card-border);
border-radius: 8px; background: var(–input-bg); color: var(–text);
outline: none; min-width: 0;
}
.edit-row input:focus { border-color: #555; }
.edit-row input::placeholder { color: var(–text-dim); }
.edit-actions { display: flex; gap: 0.4rem; }
.edit-save, .edit-cancel, .edit-delete {
font-family: ‘DM Sans’, sans-serif; font-weight: 700; font-size: 0.75rem;
padding: 0.4rem 0.7rem; border: none; border-radius: 8px;
cursor: pointer; transition: all 0.2s;
}
.edit-save { background: var(–check-green); color: var(–bg); }
.edit-cancel { background: var(–card); color: var(–text-dim); border: 1px solid var(–card-border); }
.edit-delete { background: var(–danger-glow); color: var(–danger); margin-left: auto; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Progress ── */
.progress-bar { height: 4px; border-radius: 2px; background: var(–card); margin-bottom: 1.25rem; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.35s ease; }
.push-view .progress-fill { background: var(–push-accent); }
.pull-view .progress-fill { background: var(–pull-accent); }

/* ── Bottom Bar ── */
.bottom-bar {
position: fixed; bottom: 0; left: 0; right: 0;
padding: 1rem; padding-bottom: max(1rem, env(safe-area-inset-bottom));
background: linear-gradient(transparent, var(–bg) 30%);
display: flex; justify-content: center; gap: 0.75rem;
}
.bottom-bar.hidden { display: none; }
.action-btn {
font-family: ‘Outfit’, sans-serif; font-weight: 600; font-size: 0.85rem;
padding: 0.7rem 1.5rem; border: none; border-radius: 10px;
cursor: pointer; transition: all 0.2s;
}
.action-btn:active { transform: scale(0.96); }
.btn-reset { background: var(–card); color: var(–text); border: 1px solid var(–card-border); }
.btn-end-push { background: var(–push-accent); color: #fff; }
.btn-end-pull { background: var(–pull-accent); color: #fff; }

/* ── Add Exercise Button ── */
.add-exercise {
display: flex; align-items: center; justify-content: center;
gap: 0.4rem; padding: 0.6rem; margin-top: 0.5rem;
border: 1px dashed var(–card-border); border-radius: 10px;
color: var(–text-dim); font-size: 0.8rem; font-weight: 600;
cursor: pointer; transition: all 0.2s;
}
.add-exercise:active { background: var(–section-bg); }

/* ── History ── */
.history-empty {
text-align: center; color: var(–text-dim); padding: 3rem 1rem;
font-size: 0.9rem; line-height: 1.6;
}
.history-entry {
background: var(–card); border: 1px solid var(–card-border);
border-radius: 12px; padding: 0.85rem; margin-bottom: 0.75rem;
}
.history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.history-type {
font-family: ‘Outfit’, sans-serif; font-weight: 600; font-size: 0.75rem;
text-transform: uppercase; letter-spacing: 0.08em;
padding: 0.25rem 0.6rem; border-radius: 6px;
}
.history-type.push { color: var(–push-accent); background: var(–push-glow); }
.history-type.pull { color: var(–pull-accent); background: var(–pull-glow); }
.history-date { font-size: 0.78rem; color: var(–text-dim); }
.history-stats { font-size: 0.82rem; color: var(–text-dim); margin-bottom: 0.4rem; }
.history-exercises { font-size: 0.82rem; line-height: 1.5; }
.history-ex { display: flex; gap: 0.4rem; align-items: baseline; }
.history-ex-check { color: var(–check-green); font-size: 0.7rem; }
.history-ex-miss { color: var(–text-dim); font-size: 0.7rem; }
.history-ex-name { color: var(–text); }
.history-ex-detail { color: var(–text-dim); font-size: 0.78rem; }

.history-delete {
font-family: ‘DM Sans’, sans-serif; font-size: 0.7rem; font-weight: 700;
color: var(–danger); background: none; border: 1px solid var(–card-border);
border-radius: 6px; padding: 0.2rem 0.5rem; cursor: pointer;
margin-left: 0.5rem; transition: all 0.2s;
}

.clear-history {
display: block; margin: 1rem auto; font-family: ‘DM Sans’, sans-serif;
font-weight: 700; font-size: 0.8rem; padding: 0.5rem 1.2rem;
border: 1px solid var(–card-border); border-radius: 8px;
background: var(–card); color: var(–danger); cursor: pointer;
}

/* ── Toast ── */
.toast {
position: fixed; top: 1rem; left: 50%; transform: translateX(-50%) translateY(-80px);
background: var(–check-green); color: var(–bg); font-weight: 700;
padding: 0.7rem 1.5rem; border-radius: 10px; font-size: 0.85rem;
opacity: 0; transition: all 0.35s ease; pointer-events: none; z-index: 99;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>

</head>
<body>

<h1>Push / Pull</h1>

<div class="nav">
  <div class="nav-btn" id="nav-push" onclick="switchView('push')">Push</div>
  <div class="nav-btn" id="nav-pull" onclick="switchView('pull')">Pull</div>
  <div class="nav-btn" id="nav-history" onclick="switchView('history')">History</div>
</div>

<div class="view push-view" id="view-push">
  <div class="progress-bar"><div class="progress-fill" id="progress-push"></div></div>
  <div id="list-push"></div>
</div>

<div class="view pull-view" id="view-pull">
  <div class="progress-bar"><div class="progress-fill" id="progress-pull"></div></div>
  <div id="list-pull"></div>
</div>

<div class="view" id="view-history">
  <div id="history-list"></div>
</div>

<div class="bottom-bar" id="bottom-bar"></div>

<div class="toast" id="toast"></div>

<script>
// ─── DEFAULT DATA ───
var defaultData = {
  push: [
    { section: "Warm-Up", items: [
      { name: "Leg Side to Side", detail: "" },
      { name: "Crunch with Stomach Up", detail: "" },
      { name: "Windshield", detail: "" },
      { name: "Best Stretch in the World", detail: "" },
      { name: "Superman", detail: "" },
      { name: "Banded Pull Apart", detail: "" }
    ]},
    { section: "Push Exercises", items: [
      { name: "Box Squats", detail: "Hold weight upside down, tap on bench — 50 lbs" },
      { name: "Dumbbell Chest Press", detail: "Bench, lie on back — 20 lbs" },
      { name: "Chest Fly Machine", detail: "Back to machine, deep stretch — 40 lbs" },
      { name: "Single Arm Push Press", detail: "Legs one behind the other — 17.5 lbs" },
      { name: "Single Leg Press", detail: "Left toe pointed out — 25 lbs" },
      { name: "Plank", detail: "3 sets, 30–60 seconds" }
    ]},
    { section: "Post", items: [
      { name: "Shoulder Stretch on Wall", detail: "" },
      { name: "90/90 Swivel", detail: "" },
      { name: "Tibia Stretch on Wall", detail: "" },
      { name: "Roller", detail: "" }
    ]}
  ],
  pull: [
    { section: "Warm-Up", items: [
      { name: "Leg Side to Side", detail: "" },
      { name: "Crunch with Stomach Up", detail: "" },
      { name: "Windshield", detail: "" },
      { name: "Best Stretch in the World", detail: "" },
      { name: "Superman", detail: "" },
      { name: "Banded Pull Apart", detail: "" }
    ]},
    { section: "Pull Exercises", items: [
      { name: "Kettlebell Goblet Squats", detail: "From blocks — 20 lbs" },
      { name: "Dumbbell Row", detail: "Leg on bench, row with one arm — 35 lbs" },
      { name: "Glute Bridge", detail: "Back barely on bench, weight between legs — 45 lbs" },
      { name: "Single Arm Cable Row", detail: "17.5 lbs, Pin 13" },
      { name: "TRX Assisted Pull-Ups", detail: "" },
      { name: "Dumbbell Biceps Curl", detail: "" }
    ]},
    { section: "Post", items: [
      { name: "Shoulder Stretch on Wall", detail: "" },
      { name: "90/90 Swivel", detail: "" },
      { name: "Tibia Stretch on Wall", detail: "" },
      { name: "Roller", detail: "" }
    ]}
  ]
};

// ─── STORAGE ───
function loadAll() {
  try {
    var s = localStorage.getItem('pushpull-all');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}
function saveAll() {
  try {
    localStorage.setItem('pushpull-all', JSON.stringify({
      workouts: workoutData,
      checks: checkedState,
      history: historyData
    }));
  } catch(e) {}
}
var saveTimer = null;
function debouncedSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 300);
}

// ─── STATE ───
var saved = loadAll();
var workoutData = (saved && saved.workouts) ? saved.workouts : JSON.parse(JSON.stringify(defaultData));
var checkedState = (saved && saved.checks) ? saved.checks : { push: [], pull: [] };
var historyData = (saved && saved.history) ? saved.history : [];
var currentView = 'push';
var editingItem = null; // { wk, si, ii }

// ─── VIEW SWITCHING ───
function switchView(v) {
  currentView = v;
  editingItem = null;
  ['push','pull','history'].forEach(function(id) {
    document.getElementById('view-' + id).classList.toggle('active', id === v);
    var navBtn = document.getElementById('nav-' + id);
    navBtn.className = 'nav-btn' + (id === v ? ' active-' + id : '');
  });
  if (v === 'push' || v === 'pull') {
    renderWorkout(v);
    renderBottomBar(v);
  } else {
    renderHistory();
    document.getElementById('bottom-bar').classList.add('hidden');
  }
}

// ─── RENDER WORKOUT ───
function renderWorkout(wk) {
  var list = document.getElementById('list-' + wk);
  list.innerHTML = '';

  var idx = 0;
  workoutData[wk].forEach(function(sec, si) {
    var sDiv = document.createElement('div');
    sDiv.className = 'section';
    sDiv.innerHTML = '<div class="section-title">' + esc(sec.section) + '</div>';

    sec.items.forEach(function(item, ii) {
      if (editingItem && editingItem.wk === wk && editingItem.si === si && editingItem.ii === ii) {
        sDiv.appendChild(buildEditRow(wk, si, ii, item));
      } else {
        if (!item.name.trim()) { idx++; return; }
        var thisIdx = idx;
        var el = document.createElement('div');
        el.className = 'item';
        if (checkedState[wk] && checkedState[wk][thisIdx]) el.classList.add('checked');

        var check = document.createElement('div');
        check.className = 'item-check';
        check.innerHTML = '<svg><polyline points="4 8 8 12 16 4"/></svg>';
        check.onclick = function() {
          el.classList.toggle('checked');
          if (!checkedState[wk]) checkedState[wk] = [];
          checkedState[wk][thisIdx] = el.classList.contains('checked');
          debouncedSave();
          updateProgress(wk);
        };

        var content = document.createElement('div');
        content.className = 'item-content';
        content.onclick = check.onclick;
        var detailHtml = item.detail.trim() ? '<div class="item-detail">' + esc(item.detail) + '</div>' : '';
        content.innerHTML = '<span class="item-name">' + esc(item.name) + '</span>' + detailHtml;

        var editBtn = document.createElement('div');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/></svg>';
        editBtn.onclick = function() {
          editingItem = { wk: wk, si: si, ii: ii };
          renderWorkout(wk);
        };

        el.appendChild(check);
        el.appendChild(content);
        el.appendChild(editBtn);
        sDiv.appendChild(el);
      }
      idx++;
    });

    // Add exercise button per section
    var addBtn = document.createElement('div');
    addBtn.className = 'add-exercise';
    addBtn.innerHTML = '+ Add exercise';
    (function(s) {
      addBtn.onclick = function() {
        workoutData[wk][s].items.push({ name: "", detail: "" });
        editingItem = { wk: wk, si: s, ii: workoutData[wk][s].items.length - 1 };
        renderWorkout(wk);
      };
    })(si);
    sDiv.appendChild(addBtn);

    list.appendChild(sDiv);
  });

  updateProgress(wk);
}

function buildEditRow(wk, si, ii, item) {
  var container = document.createElement('div');
  container.className = 'item-editing';

  var row1 = document.createElement('div');
  row1.className = 'edit-row';
  var inp1 = document.createElement('input');
  inp1.type = 'text'; inp1.value = item.name; inp1.placeholder = 'Exercise name';
  row1.appendChild(inp1);
  container.appendChild(row1);

  var row2 = document.createElement('div');
  row2.className = 'edit-row';
  var inp2 = document.createElement('input');
  inp2.type = 'text'; inp2.value = item.detail; inp2.placeholder = 'Notes / weight';
  row2.appendChild(inp2);
  container.appendChild(row2);

  var actions = document.createElement('div');
  actions.className = 'edit-actions';

  var saveBtn = document.createElement('button');
  saveBtn.className = 'edit-save'; saveBtn.textContent = 'Save';
  saveBtn.onclick = function() {
    workoutData[wk][si].items[ii].name = inp1.value;
    workoutData[wk][si].items[ii].detail = inp2.value;
    editingItem = null;
    saveAll();
    renderWorkout(wk);
    showToast('Saved!');
  };

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-cancel'; cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = function() {
    // If it was a new empty item, remove it
    if (!item.name.trim() && !item.detail.trim()) {
      workoutData[wk][si].items.splice(ii, 1);
    }
    editingItem = null;
    renderWorkout(wk);
  };

  var deleteBtn = document.createElement('button');
  deleteBtn.className = 'edit-delete'; deleteBtn.textContent = 'Delete';
  deleteBtn.onclick = function() {
    workoutData[wk][si].items.splice(ii, 1);
    editingItem = null;
    saveAll();
    renderWorkout(wk);
  };

  actions.appendChild(saveBtn);
  actions.appendChild(cancelBtn);
  actions.appendChild(deleteBtn);
  container.appendChild(actions);

  setTimeout(function() { inp1.focus(); }, 50);

  return container;
}

// ─── PROGRESS ───
function updateProgress(wk) {
  var container = document.getElementById('view-' + wk);
  var items = container.querySelectorAll('.item');
  var checked = container.querySelectorAll('.item.checked');
  var pct = items.length ? (checked.length / items.length) * 100 : 0;
  document.getElementById('progress-' + wk).style.width = pct + '%';
}

// ─── BOTTOM BAR ───
function renderBottomBar(wk) {
  var bar = document.getElementById('bottom-bar');
  bar.classList.remove('hidden');
  var accentClass = wk === 'push' ? 'btn-end-push' : 'btn-end-pull';
  bar.innerHTML =
    '<button class="action-btn btn-reset" onclick="resetChecks()">Reset</button>' +
    '<button class="action-btn ' + accentClass + '" onclick="endWorkout()">End Workout</button>';
}

function resetChecks() {
  var wk = currentView;
  checkedState[wk] = [];
  debouncedSave();
  renderWorkout(wk);
}

// ─── END WORKOUT ───
function endWorkout() {
  var wk = currentView;
  var now = new Date();
  var exercises = [];
  var totalItems = 0;
  var checkedCount = 0;
  var idx = 0;

  workoutData[wk].forEach(function(sec) {
    sec.items.forEach(function(item) {
      if (!item.name.trim()) { idx++; return; }
      var done = !!(checkedState[wk] && checkedState[wk][idx]);
      exercises.push({
        name: item.name,
        detail: item.detail,
        completed: done
      });
      totalItems++;
      if (done) checkedCount++;
      idx++;
    });
  });

  var entry = {
    id: now.getTime(),
    type: wk,
    date: now.toISOString(),
    total: totalItems,
    completed: checkedCount,
    exercises: exercises
  };

  historyData.unshift(entry);

  // Reset checks
  checkedState[wk] = [];
  saveAll();

  showToast(wk.charAt(0).toUpperCase() + wk.slice(1) + ' workout saved!');

  // Switch to history
  setTimeout(function() { switchView('history'); }, 600);
}

// ─── HISTORY ───
function renderHistory() {
  var list = document.getElementById('history-list');
  list.innerHTML = '';

  if (historyData.length === 0) {
    list.innerHTML = '<div class="history-empty">No workouts yet.<br>Complete a push or pull workout and tap "End Workout" to log it here.</div>';
    return;
  }

  historyData.forEach(function(entry, i) {
    var d = new Date(entry.date);
    var dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    var timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

    var div = document.createElement('div');
    div.className = 'history-entry';

    var header = '<div class="history-header">' +
      '<span class="history-type ' + entry.type + '">' + entry.type + '</span>' +
      '<span class="history-date">' + dateStr + ' · ' + timeStr +
      '<button class="history-delete" onclick="deleteHistory(' + i + ')">×</button></span>' +
      '</div>';

    var stats = '<div class="history-stats">' + entry.completed + ' / ' + entry.total + ' completed</div>';

    var exHtml = '<div class="history-exercises">';
    entry.exercises.forEach(function(ex) {
      var icon = ex.completed ? '<span class="history-ex-check">✓</span>' : '<span class="history-ex-miss">○</span>';
      var detail = ex.detail ? ' <span class="history-ex-detail">— ' + esc(ex.detail) + '</span>' : '';
      exHtml += '<div class="history-ex">' + icon + ' <span class="history-ex-name">' + esc(ex.name) + '</span>' + detail + '</div>';
    });
    exHtml += '</div>';

    div.innerHTML = header + stats + exHtml;
    list.appendChild(div);
  });

  if (historyData.length > 1) {
    var clearBtn = document.createElement('button');
    clearBtn.className = 'clear-history';
    clearBtn.textContent = 'Clear All History';
    clearBtn.onclick = function() {
      if (confirm('Clear all workout history?')) {
        historyData = [];
        saveAll();
        renderHistory();
      }
    };
    list.appendChild(clearBtn);
  }
}

function deleteHistory(i) {
  historyData.splice(i, 1);
  saveAll();
  renderHistory();
}

// ─── UTILS ───
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── GO ───
switchView('push');
